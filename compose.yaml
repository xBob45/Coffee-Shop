services:
  coffee-shop:
    build: .
    networks:
      - coffee-shop
    ports:
      - 5000:5000
    restart:
      always

  postgresql:
    image: postgres
    networks:
      - coffee-shop
    ports:
      - 5432:5432
    restart:
      always
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres

  pgadmin:
    image: dpage/pgadmin4
    networks:
      - coffee-shop
    ports:
      - 81:80
    restart:
      always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@pgadmin.com
      - PGADMIN_DEFAULT_PASSWORD=admin

networks:
  coffee-shop:
volumes:
  postgresql-data:
    driver: local
