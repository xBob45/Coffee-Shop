<VirtualHost *:80>
        # The ServerName ...
        # the server uses ...
        # redirection URLs. In the ...
        # specifies what hostname ...
        # match this virtual host. For ...
        # value is not decisive as ...
        # However, you must set ...
        #ServerName www.example.com
        
        #ServerAdmin webmaster@localhost
        DocumentRoot /var/www/html
        WSGIDaemonProcess Coffee-Shop threads=5
        WSGIScriptAlias / /var/www/html/Coffee-Shop/coffee-shop.wsgi
        WSGIApplicationGroup %{GLOBAL}
        <Directory Coffee-Shop>
             WSGIProcessGroup Coffee-Shop
             WSGIApplicationGroup %{GLOBAL}
             Order deny,allow
             Allow from all 
        </Directory>

        ProxyPass /Coffee-Shop/ http://127.0.0.1:5000/
        ProxyPassReverse /Coffee-Shop/ http://127.0.0.1:5000/
        # Available loglevels: trace...
        # error, crit, alert, emerg.
        # It is also possible ...
        # modules, e.g.
        #LogLevel info ssl:warn
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
        # For most configuration files from conf-available/, whic...
        # enabled or disabled at a global level, it is possible to
        # include a line for only one particular virtual host. F...
        # following line enables the CGI configuration for this...
        # after it has been globally disabled with "a2disconf".
        #Include conf-available/serve-cgi-bin.conf
         Header set Access-Control-Allow-Origin "*"
</VirtualHost>